<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>moodtunes</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <!-- NAV -->
    <nav class="navbar">
        <div class="logo">mood<span>tunes</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active">journal</a></li>
            <li><a href="#">playlists</a></li>
            <li><a href="#">history</a></li>
            <li><a href="#">discover</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="container">

        <!-- MOOD SELECTOR -->
        <section class="mood-section">
            <p class="section-label">how are you feeling right now?</p>
            <div class="mood-chips">
                <button class="chip" data-mood="happy">happy</button>
                <button class="chip" data-mood="sad">sad</button>
                <button class="chip" data-mood="hype">hype</button>
                <button class="chip" data-mood="heartbreak">heartbreak</button>
                <button class="chip" data-mood="nostalgic">nostalgic</button>
                <button class="chip" data-mood="focused">focused</button>
                <button class="chip" data-mood="chill">chill</button>
            </div>
        </section>

        <!-- SONG SEARCH -->
        <section class="search-section">
            <div class="search-row">
                <input type="text" id="song-search" placeholder="search for a song to log..." />
                <button id="log-btn">+ log song</button>
            </div>
            <!-- search results will appear here -->
            <div id="search-results"></div>
        </section>

        <!-- RECENT LOGS -->
        <section class="logs-section">
            <p class="section-label">recently logged</p>
            <!-- logged songs will be injected here by JS -->
            <div id="logs-list"></div>
        </section>

    </main>
    <script src="js/config.js"></script>
    <script src="js/token.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
